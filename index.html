<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DecodeLabs AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── CSS Variables ─────────────────────────── */
:root[data-theme="dark"] {
  --bg:            #0e1117;
  --sidebar-bg:    #090c12;
  --card-bg:       #171c27;
  --card-border:   #1f2635;
  --card-hover:    #1d2436;
  --input-bg:      #141925;
  --input-border:  #1f2635;
  --text-primary:  #e8eaf0;
  --text-secondary:#8892a4;
  --text-muted:    #515a6e;
  --heading:       #ffffff;
  --accent:        #7c5cdb;
  --accent-glow:   rgba(124,92,219,0.25);
  --accent2:       #a78bfa;
  --send-bg:       #7c5cdb;
  --msg-user-bg:   #7c5cdb;
  --msg-bot-bg:    #1a2030;
  --msg-bot-border:#252d3d;
  --scrollbar:     #1f2635;
  --badge-bg:      rgba(124,92,219,0.15);
  --badge-text:    #a78bfa;
  --shadow:        0 8px 32px rgba(0,0,0,0.4);
}

:root[data-theme="light"] {
  --bg:            #f4f4f8;
  --sidebar-bg:    #ececf0;
  --card-bg:       #ffffff;
  --card-border:   #e5e5ec;
  --card-hover:    #f0f0f8;
  --input-bg:      #ffffff;
  --input-border:  #e0e0ea;
  --text-primary:  #1a1a2e;
  --text-secondary:#4a4a6a;
  --text-muted:    #9090a8;
  --heading:       #111122;
  --accent:        #7c5cdb;
  --accent-glow:   rgba(124,92,219,0.12);
  --accent2:       #9474e8;
  --send-bg:       #7c5cdb;
  --msg-user-bg:   #7c5cdb;
  --msg-bot-bg:    #ffffff;
  --msg-bot-border:#e5e5ec;
  --scrollbar:     #e0e0ea;
  --badge-bg:      rgba(124,92,219,0.08);
  --badge-text:    #7c5cdb;
  --shadow:        0 4px 20px rgba(0,0,0,0.08);
}

/* ─── Reset ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  transition: background .3s, color .3s;
}

/* ─── Layout ─────────────────────────────────── */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── Hamburger Toggle ───────────────────────── */
.menu-toggle {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 300;
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color .2s, color .2s, background .2s;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.menu-toggle:hover { border-color: var(--accent); color: var(--accent); }
.menu-toggle svg { width: 17px; height: 17px; }

/* ─── Side Panel ─────────────────────────────── */
.side-panel {
  position: fixed;
  top: 0; left: 0;
  width: 272px;
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--card-border);
  display: flex;
  flex-direction: column;
  z-index: 200;
  transform: translateX(-100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow: 6px 0 32px rgba(0,0,0,0.35);
}
.side-panel.open { transform: translateX(0); }

.panel-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--card-border);
  flex-shrink: 0;
}
.panel-logo {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: .03em;
}
.panel-close {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, color .2s;
}
.panel-close:hover { background: var(--card-bg); color: var(--text-primary); }
.panel-close svg { width: 15px; height: 15px; }

.panel-new-chat {
  margin: 12px 10px 4px;
  padding: 10px 14px;
  border-radius: 10px;
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  color: var(--accent2);
  font-size: 13px; font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: opacity .2s;
  flex-shrink: 0;
}
.panel-new-chat:hover { opacity: .78; }
.panel-new-chat svg { width: 14px; height: 14px; }

.panel-section-label {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  padding: 14px 14px 5px;
  flex-shrink: 0;
}

.panel-history {
  flex: 1;
  overflow-y: auto;
  padding: 2px 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--scrollbar) transparent;
}
.panel-history::-webkit-scrollbar { width: 3px; }
.panel-history::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

.history-item {
  padding: 9px 10px;
  border-radius: 9px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--text-secondary);
  transition: background .15s, color .15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex; align-items: center; gap: 8px;
}
.history-item:hover { background: var(--card-bg); color: var(--text-primary); }
.history-item svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--text-muted); }

.history-empty {
  padding: 22px 12px;
  text-align: center;
  font-size: 12.5px;
  color: var(--text-muted);
}

.panel-bottom {
  padding: 10px;
  border-top: 1px solid var(--card-border);
  flex-shrink: 0;
}
.panel-theme-btn {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: border-color .2s, color .2s;
}
.panel-theme-btn:hover { border-color: var(--accent); color: var(--accent); }
.panel-theme-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ─── Overlay (click outside to close panel) ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 150;
  background: rgba(0,0,0,0.35);
}
.overlay.show { display: block; }

/* ─── Main Area ──────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ─── Welcome Screen ─────────────────────────── */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 60px;
  gap: 40px;
  overflow-y: auto;
}

.greeting {
  text-align: center;
  line-height: 1.15;
}
.greeting h1 {
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 700;
  color: var(--heading);
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.greeting h1 span.name {
  background: linear-gradient(135deg, #9d7aff 0%, #c4a7ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.greeting h2 {
  font-size: clamp(28px, 3.5vw, 46px);
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, #c084fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Suggestion cards */
.suggestions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 900px;
}
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 20px 18px;
  cursor: pointer;
  transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
  display: flex; flex-direction: column; gap: 14px;
}
.card:hover {
  background: var(--card-hover);
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 0 0 1px var(--accent-glow), var(--shadow);
}
.card-icon {
  width: 36px; height: 36px;
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
}
.card-icon svg { width: 28px; height: 28px; }
.card p {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.45;
}

/* ─── Chat View ──────────────────────────────── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 60px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--scrollbar) transparent;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

.message {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  max-width: 720px;
  animation: msgIn .25s ease;
}
@keyframes msgIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.message.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
}
.user .msg-avatar { background: var(--msg-user-bg); color: #fff; }
.bot  .msg-avatar { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--accent); font-size: 15px; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  max-width: 560px;
  white-space: pre-wrap;
}
.user .msg-bubble { background: var(--msg-user-bg); color: #fff; border-bottom-right-radius: 4px; }
.bot  .msg-bubble { background: var(--msg-bot-bg); border: 1px solid var(--msg-bot-border); color: var(--text-primary); border-bottom-left-radius: 4px; }

.msg-source {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
  padding-left: 4px;
}

/* Typing indicator */
.typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
.typing span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  display: inline-block;
  animation: bounce .9s infinite;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40%          { transform: translateY(-6px); }
}

/* ─── Input Bar ──────────────────────────────── */
.input-wrap {
  padding: 16px 60px 24px;
  flex-shrink: 0;
}
.input-box {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 18px;
  padding: 16px 18px 12px;
  transition: border-color .2s, box-shadow .2s;
  box-shadow: var(--shadow);
}
.input-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.input-box textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 24px;
  max-height: 120px;
  overflow-y: auto;
}
.input-box textarea::placeholder { color: var(--text-muted); }

.input-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.action-btn {
  display: flex; align-items: center; gap: 6px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color .2s, background .2s;
}
.action-btn:hover { color: var(--text-secondary); background: var(--card-border); }
.action-btn svg { width: 15px; height: 15px; }

.spacer { flex: 1; }

.send-btn {
  width: 38px; height: 38px;
  background: var(--send-bg);
  border: none;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: opacity .2s, transform .2s;
  color: #fff;
  flex-shrink: 0;
}
.send-btn:hover { opacity: .88; transform: scale(1.06); }
.send-btn:active { transform: scale(.96); }
.send-btn svg { width: 17px; height: 17px; margin-left: 2px; }

/* ─── Chat Header ────────────────────────────── */
.chat-header {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 14px 60px;
  border-bottom: 1px solid var(--card-border);
  flex-shrink: 0;
}
.chat-header.visible { display: flex; }

.back-btn {
  background: transparent; border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-family: inherit;
  transition: color .2s;
}
.back-btn:hover { color: var(--text-primary); }
.back-btn svg { width: 16px; height: 16px; }

.chat-title {
  font-size: 14px; font-weight: 600; color: var(--text-secondary);
}
.source-badge {
  margin-left: auto;
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  background: var(--badge-bg); color: var(--badge-text);
  border: 1px solid var(--accent-glow);
}

/* ─── Utility ────────────────────────────────── */
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <!-- ── Overlay (click outside to close panel) ── -->
  <div class="overlay" id="overlay" onclick="closePanel()"></div>

  <!-- ── Hamburger toggle ── -->
  <button class="menu-toggle" id="menuToggle" onclick="togglePanel()" title="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- ── Side Panel ── -->
  <div class="side-panel" id="sidePanel">

    <div class="panel-top">
      <span class="panel-logo">⚡ DecodeLabs AI</span>
      <button class="panel-close" onclick="closePanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6"  y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- New Chat -->
    <button class="panel-new-chat" onclick="startNewChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5"  y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <!-- History list -->
    <div class="panel-section-label">History</div>
    <div class="panel-history" id="historyList">
      <div class="history-empty">No saved chats yet.</div>
    </div>

    <!-- Theme toggle at bottom -->
    <div class="panel-bottom">
      <button class="panel-theme-btn" onclick="toggleTheme()">
        <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" class="hidden">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        Toggle Theme
      </button>
    </div>

  </div><!-- /side-panel -->

  <!-- ── Main ── -->
  <main class="main">

    <!-- Chat header (visible only in chat mode) -->
    <div class="chat-header" id="chatHeader">
      <button class="back-btn" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Home
      </button>
      <span class="chat-title">DecodeLabs AI — Finance &amp; Healthcare</span>
      <span class="source-badge" id="sourceBadge">Rule-based</span>
    </div>

    <!-- Welcome screen -->
    <section class="welcome" id="welcomeScreen">
      <div class="greeting">
        <h1>Hi there</h1>
        <h2>What would you like to know?</h2>
      </div>

      <div class="suggestions">
        <div class="card" onclick="sendSuggestion('Analyze my stock portfolio')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
              <polyline points="16 7 22 7 22 13"/>
            </svg>
          </div>
          <p>Analyze my stock portfolio</p>
        </div>

        <div class="card" onclick="sendSuggestion('Explain health insurance plans')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="7" width="18" height="14" rx="2"/>
              <path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/>
              <line x1="12" y1="12" x2="12" y2="16"/>
              <line x1="10" y1="14" x2="14" y2="14"/>
            </svg>
          </div>
          <p>Explain health insurance plans</p>
        </div>

        <div class="card" onclick="sendSuggestion('Budgeting tips for savings')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 11c0-4-3.13-7-7-7S5 7 5 11c0 1.57.5 3.03 1.35 4.21L5 21h4l1-2h4l1 2h4l-1.35-5.79C18.5 14.03 19 12.57 19 11z"/>
              <line x1="12" y1="7" x2="12" y2="11"/>
              <circle cx="17" cy="11" r="1"/>
            </svg>
          </div>
          <p>Budgeting tips for savings</p>
        </div>

        <div class="card" onclick="sendSuggestion('Symptoms of seasonal allergies')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 20A7 7 0 014 13c0-7 7-11 7-11s7 4 7 11a7 7 0 01-7 7z"/>
              <line x1="11" y1="20" x2="11" y2="9"/>
            </svg>
          </div>
          <p>Symptoms of seasonal allergies</p>
        </div>
      </div>
    </section>

    <!-- Chat messages -->
    <div class="chat-area hidden" id="chatArea"></div>

    <!-- Input bar -->
    <div class="input-wrap">
      <div class="input-box">
        <textarea id="userInput" placeholder="Ask whatever you want…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="input-actions">
          <button class="action-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41A2 2 0 016.58 14.6l8.49-8.48"/>
            </svg>
            Add Attachment
          </button>
          <button class="action-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            Use Image
          </button>
          <div class="spacer"></div>
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
// ─── Theme ─────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('sunIcon').classList.toggle('hidden', !dark);
  document.getElementById('moonIcon').classList.toggle('hidden', dark);
}

// ─── Panel open / close ─────────────────────────
function togglePanel() {
  const panel   = document.getElementById('sidePanel');
  const overlay = document.getElementById('overlay');
  const isOpen  = panel.classList.contains('open');
  if (isOpen) {
    closePanel();
  } else {
    panel.classList.add('open');
    overlay.classList.add('show');
    loadHistory();
  }
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ─── App state ──────────────────────────────────
let inChat = false;

function goHome() {
  inChat = false;
  document.getElementById('welcomeScreen').classList.remove('hidden');
  document.getElementById('chatArea').classList.add('hidden');
  document.getElementById('chatHeader').classList.remove('visible');
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('userInput').value = '';
  autoResize(document.getElementById('userInput'));
}

// ─── Textarea auto-resize ───────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─── Enter to send ──────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ─── Suggestion click ───────────────────────────
function sendSuggestion(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

// ─── Send message ───────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;

  if (!inChat) {
    inChat = true;
    document.getElementById('welcomeScreen').classList.add('hidden');
    document.getElementById('chatArea').classList.remove('hidden');
    document.getElementById('chatHeader').classList.add('visible');
  }

  input.value = '';
  autoResize(input);

  const chatArea = document.getElementById('chatArea');
  chatArea.appendChild(createBubble('user', text));
  scrollBottom();

  const typingEl = createTyping();
  chatArea.appendChild(typingEl);
  scrollBottom();

  try {
    const res  = await fetch('/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text }),
    });
    const data = await res.json();
    typingEl.remove();
    chatArea.appendChild(createBubble('bot', data.response, data.source));
    updateSourceBadge(data.source);
    scrollBottom();
  } catch (err) {
    typingEl.remove();
    chatArea.appendChild(createBubble('bot',
      '⚠️ Could not reach the server. Make sure app.py is running on localhost:5000.', 'error'));
    scrollBottom();
  }
}

// ─── Load history from backend ──────────────────
async function loadHistory() {
  try {
    const res  = await fetch('/history');
    const data = await res.json();
    const list = document.getElementById('historyList');

    if (!data.length) {
      list.innerHTML = '<div class="history-empty">No saved chats yet.</div>';
      return;
    }

    list.innerHTML = [...data].reverse().map(chat => `
      <div class="history-item" onclick="openChat('${chat.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        ${chat.title || 'Untitled Chat'}
      </div>
    `).join('');
  } catch (err) {
    console.error('Failed to load history:', err);
  }
}

// ─── Open a past chat ───────────────────────────
async function openChat(chatId) {
  try {
    const res  = await fetch(`/history/${chatId}`);
    const data = await res.json();

    closePanel();

    inChat = true;
    document.getElementById('welcomeScreen').classList.add('hidden');
    document.getElementById('chatArea').classList.remove('hidden');
    document.getElementById('chatHeader').classList.add('visible');
    document.getElementById('chatArea').innerHTML = '';

    data.messages.forEach(msg => {
      document.getElementById('chatArea').appendChild(createBubble('user', msg.user));
      document.getElementById('chatArea').appendChild(createBubble('bot',  msg.bot, 'rule'));
    });

    scrollBottom();
  } catch (err) {
    console.error('Failed to open chat:', err);
  }
}

// ─── New chat ───────────────────────────────────
async function startNewChat() {
  try { await fetch('/new_chat', { method: 'POST' }); } catch (e) {}
  closePanel();
  goHome();
}

// ─── DOM helpers ────────────────────────────────
function createBubble(role, text, source) {
  const wrap   = document.createElement('div');
  wrap.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className  = 'msg-avatar';
  avatar.textContent = role === 'user' ? 'A' : '🤖';

  const col    = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className  = 'msg-bubble';
  bubble.textContent = text;
  col.appendChild(bubble);

  if (role === 'bot' && source) {
    const src = document.createElement('div');
    src.className  = 'msg-source';
    src.textContent = source === 'llm' ? '✦ AI generated (Groq)' : '⚡ Rule-based (O(1))';
    col.appendChild(src);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(col);
  return wrap;
}

function createTyping() {
  const wrap   = document.createElement('div');
  wrap.className = 'message bot';
  const avatar = document.createElement('div');
  avatar.className  = 'msg-avatar';
  avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  bubble.appendChild(typing);
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  return wrap;
}

function updateSourceBadge(source) {
  document.getElementById('sourceBadge').textContent =
    source === 'llm' ? 'Groq (AI)' : 'Rule-based';
}

function scrollBottom() {
  const c = document.getElementById('chatArea');
  c.scrollTop = c.scrollHeight;
}
</script>
</body>
</html>
